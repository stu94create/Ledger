<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#1a3528" />
<meta name="color-scheme" content="light" />
<title>Ledger — Invoices</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Lora:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; worker-src 'self'; form-action 'none'; base-uri 'none'" />
<link rel="manifest" href="manifest.webmanifest" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Ledger" />
<link rel="apple-touch-icon" href="icon.svg" />
<link rel="icon" href="icon.svg" type="image/svg+xml" />
<style>
:root{--paper:#f5efe0;--paper-deep:#ebe3d0;--paper-soft:#faf6e9;--paper-edge:#d9cfb8;--rule:#b8a982;--rule-soft:#ddd2b3;--ink:#2a2520;--ink-muted:#6e6655;--green:#1a3528;--green-mid:#2e5942;--green-tint:#d6dfd0;--red:#8a3030;--gold:#a8843e;--white:#fffef7;--display:"EB Garamond",Garamond,serif;--body:"Lora",Georgia,serif;--mono:"IBM Plex Mono",Menlo,monospace;--shadow-1:0 1px 2px rgba(42,37,32,.08),0 4px 12px rgba(42,37,32,.05);--shadow-2:0 4px 10px rgba(42,37,32,.12),0 16px 32px rgba(42,37,32,.08);--r-sm:2px;--r-md:4px;--r-lg:6px}
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--paper);min-height:100%}
html{height:100%;color-scheme:light;background-color:var(--paper)!important}
body{font-family:var(--body);font-size:17px;line-height:1.55;color:var(--ink);background-color:var(--paper)!important;-webkit-font-smoothing:antialiased;min-height:100vh;min-height:100svh}
button{font:inherit;color:inherit;background:none;border:0;padding:0;cursor:pointer;text-align:left}
input,select,textarea{font:inherit;color:var(--ink)}
h1,h2,h3,h4{margin:0;font-family:var(--display);font-weight:600;letter-spacing:.005em;color:var(--green)}
h1{font-size:1.95rem;line-height:1.15}h2{font-size:1.6rem;line-height:1.2}h3{font-size:1.25rem;line-height:1.3}p{margin:0 0 .6em}
:focus-visible{outline:3px solid var(--gold);outline-offset:2px;border-radius:var(--r-sm)}
[tabindex="-1"]:focus,[tabindex="-1"]:focus-visible{outline:none}
.sr-only{position:absolute!important;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
.skip-link{position:absolute;top:-40px;left:8px;background:var(--green);color:var(--paper);padding:8px 12px;z-index:1000;border-radius:var(--r-md);font-family:var(--body)}
.skip-link:focus{top:8px}
#app{max-width:720px;margin:0 auto;background-color:var(--paper);min-height:100vh;min-height:100svh;padding:0 0 calc(env(safe-area-inset-bottom,0px) + 24px)}
.masthead{background:var(--green);color:var(--paper);padding:calc(env(safe-area-inset-top,0px) + 14px) 20px 0;border-bottom:1px solid #0d2218;box-shadow:var(--shadow-1)}
.masthead-row{display:flex;align-items:baseline;justify-content:space-between;gap:12px;padding-bottom:14px;border-bottom:1px solid #2c4a3a}
.brand{display:flex;align-items:baseline;gap:10px}
.brand-mark{font-family:var(--display);font-size:1.6rem;font-style:italic;color:var(--gold);line-height:1}
.brand-name{font-family:var(--display);font-size:1.6rem;font-weight:500;color:var(--paper);letter-spacing:.04em;margin:0}
.brand-sub{font-family:var(--body);font-size:.78rem;font-style:italic;color:var(--gold);letter-spacing:.06em;text-transform:uppercase}
.tabs{display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab{flex:1 1 auto;min-width:max-content;padding:14px;font-family:var(--display);font-size:1.05rem;color:var(--paper);opacity:.65;border-bottom:2px solid transparent;text-align:center;transition:opacity .15s,border-color .15s}
.tab[aria-current="page"]{opacity:1;border-bottom-color:var(--gold);color:var(--white)}
main{padding:24px 20px 40px}
.view-heading{margin:0 0 18px;padding-bottom:10px;border-bottom:1px solid var(--paper-edge);display:flex;align-items:baseline;justify-content:space-between;gap:10px}
.view-heading h2{font-style:italic;font-weight:500}
.view-meta{font-family:var(--mono);font-size:.78rem;color:var(--ink-muted);text-transform:uppercase;letter-spacing:.08em}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 18px;font-family:var(--body);font-weight:600;font-size:1rem;border-radius:var(--r-md);border:1px solid transparent;transition:background .15s,border-color .15s,transform .05s;min-height:44px}
.btn:active{transform:translateY(1px)}
.btn-primary{background:var(--green);color:var(--paper);border-color:var(--green)}
.btn-primary:hover{background:var(--green-mid)}
.btn-secondary{background:var(--paper-soft);color:var(--green);border-color:var(--paper-edge)}
.btn-secondary:hover{background:var(--paper);border-color:var(--rule)}
.btn-ghost{background:transparent;color:var(--green);text-decoration:underline;text-underline-offset:3px;text-decoration-color:var(--gold)}
.btn-danger{background:var(--red);color:var(--paper);border-color:var(--red)}
.btn-danger:hover{background:#6a2424}
.btn-row{display:flex;flex-wrap:wrap;gap:10px;margin-top:16px}
.btn-block{display:flex;width:100%}
.stack{display:flex;flex-direction:column;gap:12px}
.card-button{display:block;width:100%;text-align:left;background:var(--paper-soft);border:1px solid var(--paper-edge);border-radius:var(--r-lg);padding:16px 18px;box-shadow:var(--shadow-1);transition:border-color .15s,transform .05s,box-shadow .15s}
.card-button:hover{border-color:var(--rule);box-shadow:var(--shadow-2)}
.card-button:active{transform:translateY(1px)}
.card-row{display:flex;justify-content:space-between;align-items:baseline;gap:12px}
.card-title{font-family:var(--display);font-size:1.2rem;font-weight:600;color:var(--green);margin:0 0 4px}
.card-sub{color:var(--ink-muted);font-size:.92rem}
.card-figure{font-family:var(--mono);font-weight:500;color:var(--ink);font-size:1rem}
.pill{display:inline-block;padding:3px 10px;border-radius:999px;font-family:var(--mono);font-size:.72rem;font-weight:500;text-transform:uppercase;letter-spacing:.08em;border:1px solid currentColor}
.pill-draft{color:var(--ink-muted);background:var(--paper-deep)}
.pill-sent{color:var(--green);background:var(--green-tint)}
.pill-paid{color:var(--paper);background:var(--green);border-color:var(--green)}
.pill-overdue{color:var(--paper);background:var(--red);border-color:var(--red)}
.pill-default{color:var(--gold);background:transparent;border-color:var(--gold)}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.stat{background:var(--paper-soft);border:1px solid var(--paper-edge);border-radius:var(--r-lg);padding:14px;box-shadow:var(--shadow-1)}
.stat-label{font-family:var(--mono);font-size:.7rem;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-muted)}
.stat-value{font-family:var(--display);font-size:1.65rem;font-weight:500;color:var(--green);margin-top:4px;font-variant-numeric:tabular-nums}
.stat-sub{font-size:.85rem;color:var(--ink-muted);margin-top:2px}
.stat.alert .stat-value{color:var(--red)}
.section-title{font-family:var(--display);font-size:1.15rem;font-style:italic;color:var(--green);margin:18px 0 10px;padding-bottom:6px;border-bottom:1px dashed var(--rule-soft);display:flex;justify-content:space-between;align-items:baseline}
.filter-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:12px;margin-bottom:8px;-webkit-overflow-scrolling:touch}
.filter-row::-webkit-scrollbar{display:none}
.filter-btn{flex:0 0 auto;padding:8px 14px;border:1px solid var(--paper-edge);background:var(--paper-soft);color:var(--ink-muted);border-radius:999px;font-size:.88rem;font-family:var(--mono);text-transform:uppercase;letter-spacing:.05em;min-height:36px}
.filter-btn[aria-checked="true"]{background:var(--green);color:var(--paper);border-color:var(--green)}
.help-item{background:var(--paper-soft);border:1px solid var(--paper-edge);border-radius:var(--r-md);margin-bottom:8px;overflow:hidden}
.help-item[open]{box-shadow:var(--shadow-1)}
.help-item summary{padding:14px 16px;font-family:var(--display);font-size:1.05rem;color:var(--green);cursor:pointer;list-style:none;font-weight:500;min-height:44px;display:flex;align-items:center;gap:8px}
.help-item summary::-webkit-details-marker{display:none}
.help-item summary::before{content:"+";color:var(--gold);font-weight:bold;font-size:1.2rem;line-height:1;width:.8em;flex:0 0 auto}
.help-item[open] summary::before{content:"−"}
.help-item summary:focus-visible{outline:3px solid var(--gold);outline-offset:-3px}
.help-body{padding:0 16px 14px;line-height:1.6}
.help-body p{margin:0 0 .7em}
.help-body p:last-child{margin-bottom:0}
.help-body strong{color:var(--green);font-family:var(--display);font-style:italic;font-weight:500}
.form{display:flex;flex-direction:column;gap:14px}
.field{display:flex;flex-direction:column;gap:5px}
.field label,.field-label{font-family:var(--mono);font-size:.78rem;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-muted);font-weight:500}
.field input,.field textarea,.field select{background:var(--white);border:1px solid var(--paper-edge);border-radius:var(--r-md);padding:12px 14px;font-family:var(--body);font-size:1rem;min-height:44px;width:100%}
.field textarea{min-height:88px;resize:vertical;line-height:1.5}
.field input:focus,.field textarea:focus,.field select:focus{outline:3px solid var(--gold);outline-offset:1px;border-color:var(--green)}
.field-mono input{font-family:var(--mono)}
.field-help{font-size:.85rem;color:var(--ink-muted);font-style:italic}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.field-check{display:flex;align-items:center;gap:10px;padding:10px 0}
.field-check input{width:20px;height:20px;margin:0;accent-color:var(--green)}
.field-check label{font-family:var(--body);font-size:1rem;color:var(--ink);text-transform:none;letter-spacing:0}
.saved-select{background:var(--paper-soft);border:1px solid var(--paper-edge);border-radius:var(--r-md);padding:10px 12px;min-height:44px;font-family:var(--body)}
.line-items{display:flex;flex-direction:column;gap:12px}
.line-item{background:var(--paper);border:1px solid var(--paper-edge);border-radius:var(--r-md);padding:12px;display:flex;flex-direction:column;gap:10px}
.line-item-head{display:flex;justify-content:space-between;align-items:baseline;font-family:var(--mono);font-size:.8rem;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-muted)}
.line-item-sum{font-family:var(--mono);font-weight:600;color:var(--green);font-size:.95rem}
.empty{text-align:center;padding:40px 20px;color:var(--ink-muted)}
.empty-mark{font-family:var(--display);font-style:italic;font-size:2.2rem;color:var(--gold);margin-bottom:6px}
.empty p{font-style:italic}
.modal-backdrop{position:fixed;inset:0;background:rgba(20,16,12,.55);display:flex;align-items:stretch;justify-content:center;z-index:100;overflow-y:auto;padding:20px 0}
.modal{background:var(--paper);border-radius:var(--r-lg);box-shadow:var(--shadow-2);width:100%;max-width:680px;margin:auto 16px;border:1px solid var(--paper-edge);border-top:4px solid var(--green);overflow:hidden;display:flex;flex-direction:column}
.modal-head{padding:18px 20px 14px;border-bottom:1px solid var(--paper-edge);display:flex;justify-content:space-between;align-items:baseline;gap:12px;background:var(--paper-soft)}
.modal-head h2{font-style:italic;font-weight:500}
.modal-close{font-family:var(--display);font-size:1.6rem;color:var(--green);padding:4px 10px;border-radius:var(--r-sm);line-height:1;min-height:44px;min-width:44px}
.modal-close:hover{background:var(--paper-deep)}
.modal-body{padding:20px;overflow-y:auto}
.modal-foot{padding:14px 20px calc(14px + env(safe-area-inset-bottom,0px));background:var(--paper-soft);border-top:1px solid var(--paper-edge);display:flex;flex-wrap:wrap;gap:10px;justify-content:flex-end}
.invoice-doc{background:var(--white);border:1px solid var(--paper-edge);border-radius:var(--r-md);padding:28px 24px;box-shadow:var(--shadow-1);font-family:var(--body);color:var(--ink);line-height:1.5}
.invoice-doc-head{display:flex;justify-content:space-between;align-items:flex-start;gap:20px;padding-bottom:18px;border-bottom:2px solid var(--green);margin-bottom:18px}
.invoice-doc-head h1{font-family:var(--display);font-size:2.2rem;font-style:italic;color:var(--green);margin:0;letter-spacing:.02em}
.doc-meta{text-align:right;font-family:var(--mono);font-size:.85rem;line-height:1.6}
.doc-meta strong{font-family:var(--display);font-weight:600;color:var(--green);font-size:1rem}
.doc-parties{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:22px}
.doc-block-label{font-family:var(--mono);font-size:.72rem;text-transform:uppercase;letter-spacing:.12em;color:var(--ink-muted);margin-bottom:4px}
.doc-block strong{font-family:var(--display);color:var(--green);font-size:1.05rem}
.doc-table{width:100%;border-collapse:collapse;margin-bottom:16px;font-size:.95rem}
.doc-table th{text-align:left;font-family:var(--mono);font-size:.72rem;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-muted);padding:8px 6px;border-bottom:1px solid var(--green)}
.doc-table th.num,.doc-table td.num{text-align:right;font-family:var(--mono);font-variant-numeric:tabular-nums}
.doc-table td{padding:10px 6px;border-bottom:1px solid var(--rule-soft);vertical-align:top}
.doc-table tfoot td{border:0;padding:6px;font-family:var(--mono)}
.doc-table tfoot tr.total td{font-family:var(--display);font-size:1.15rem;font-weight:600;color:var(--green);border-top:2px solid var(--green);padding-top:10px}
.doc-foot{margin-top:18px;padding-top:14px;border-top:1px dashed var(--rule);font-size:.92rem;color:var(--ink-muted)}
.doc-foot strong{color:var(--ink);font-family:var(--display);font-style:italic;font-weight:500}
.doc-foot-block{margin-top:10px;white-space:pre-wrap}
.toast{position:fixed;bottom:calc(env(safe-area-inset-bottom,0px) + 20px);left:50%;transform:translateX(-50%);background:var(--green);color:var(--paper);padding:12px 20px;border-radius:var(--r-md);box-shadow:var(--shadow-2);z-index:200;font-size:.95rem;max-width:90%}
.toast-action{background:var(--gold);color:var(--ink);display:flex;gap:12px;align-items:center}
.toast-action-btn{background:var(--ink);color:var(--paper);border:0;padding:6px 14px;border-radius:var(--r-sm);font:inherit;font-weight:600;cursor:pointer;min-height:36px;font-size:.9rem;font-family:var(--body)}
.toast-action-btn:hover{background:var(--green)}
@media print{body{background:#fff}#app,.invoice-status-row,.masthead,.tabs,.btn-row,.modal-head,.modal-foot,nav,.skip-link,#toast-host{display:none!important}.modal-backdrop{position:static;background:none;padding:0;display:block}.modal{box-shadow:none;border:0;max-width:none;margin:0}.modal-body{padding:0}.invoice-doc{border:0;box-shadow:none;padding:0}@page{margin:18mm}}
@media (max-width:420px){.field-row,.doc-parties{grid-template-columns:1fr}.invoice-doc{padding:20px 16px}.invoice-doc-head{flex-direction:column;gap:10px}.doc-meta{text-align:left}}
@media (prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.001ms!important;transition-duration:.001ms!important}}
</style>
</head>
<body>
<a href="#main" class="skip-link">Skip to main content</a>
<div id="app">
<header class="masthead" role="banner">
<div class="masthead-row">
<div class="brand"><span class="brand-mark" aria-hidden="true">§</span><h1 class="brand-name">Ledger</h1></div>
<span class="brand-sub" aria-hidden="true">Anno MMXXVI</span>
</div>
<nav class="tabs" aria-label="Sections">
<button class="tab" data-view="dashboard" aria-current="page">Dashboard</button>
<button class="tab" data-view="invoices">Invoices</button>
<button class="tab" data-view="clients">Clients</button>
<button class="tab" data-view="settings">Settings</button>
</nav>
</header>
<main id="main" tabindex="-1" role="main"></main>
</div>
<div id="modal-host" aria-hidden="true"></div>
<div id="toast-host" role="status" aria-live="polite" class="sr-only"></div>
<script>
const KEY="ledger.v1";
const HKEY="ledger.v1.history";
const BKEY="ledger.v1.lastBackup";
const LKEY="ledger.v1.lock";
const HMAX=20;
const RELOCK_AFTER_MS=60000;
let _persistGranted=false;
let _isLocked=false;
let _hiddenSince=null;
const uid=(p="id")=>p+"-"+Math.random().toString(36).slice(2,9)+Date.now().toString(36).slice(-3);
const DEFAULTS=()=>({profiles:[{id:uid("pf"),label:"Default",name:"",address:"",email:"",phone:"",vatNumber:"",paymentDetails:"",invoicePrefix:"INV",nextSeq:1,isDefault:true}],lineItemTemplates:[],clients:[],invoices:[],settings:{defaultVatRate:23,defaultPaymentTermsDays:14,currency:"EUR",locale:"en-IE"}});
let state=loadState(),view="dashboard",invoiceFilter="all",lastFocus=null;
function loadState(){try{const raw=localStorage.getItem(KEY);if(!raw)return DEFAULTS();let p=JSON.parse(raw);const def=DEFAULTS();if(p.business&&!p.profiles){const b=p.business,seq=p.settings?.nextInvoiceSeq||1;p.profiles=[{id:uid("pf"),label:b.name||"Default",name:b.name||"",address:b.address||"",email:b.email||"",phone:b.phone||"",vatNumber:b.vatNumber||"",paymentDetails:b.paymentDetails||"",invoicePrefix:b.invoicePrefix||"INV",nextSeq:seq,isDefault:true}];delete p.business;if(p.settings)delete p.settings.nextInvoiceSeq;}p.profiles=p.profiles?.length?p.profiles:def.profiles;if(!p.profiles.some(x=>x.isDefault))p.profiles[0].isDefault=true;p.lineItemTemplates=p.lineItemTemplates||[];p.clients=p.clients||[];p.invoices=p.invoices||[];const dpid=p.profiles.find(x=>x.isDefault)?.id||p.profiles[0].id;for(const inv of p.invoices){if(!inv.profileId||!p.profiles.some(x=>x.id===inv.profileId))inv.profileId=dpid;}return{profiles:p.profiles,lineItemTemplates:p.lineItemTemplates,clients:p.clients,invoices:p.invoices,settings:{...def.settings,...(p.settings||{})}};}catch(e){console.warn(e);return DEFAULTS();}}
function saveState(){try{pushHistory();localStorage.setItem(KEY,JSON.stringify(state));}catch(e){console.warn(e);if(e&&(e.name==="QuotaExceededError"||e.code===22||e.code===1014))toast("Storage full — download a backup and free up space");else toast("Couldn't save — "+(e?.message||"unknown error"));}}
function pushHistory(){try{const raw=localStorage.getItem(KEY);if(!raw)return;const h=JSON.parse(localStorage.getItem(HKEY)||"[]");if(h[0]&&h[0].snapshot===raw)return;h.unshift({at:new Date().toISOString(),snapshot:raw});while(h.length>HMAX)h.pop();localStorage.setItem(HKEY,JSON.stringify(h));}catch(e){console.warn(e);}}
function loadHistory(){try{return JSON.parse(localStorage.getItem(HKEY)||"[]");}catch{return[];}}
function daysSince(iso){if(!iso)return Infinity;const d=new Date(iso);return isNaN(d)?Infinity:(Date.now()-d.getTime())/86400000;}
function fmtRelative(iso){if(!iso)return"never";const m=(Date.now()-new Date(iso).getTime())/60000;if(m<1)return"just now";if(m<60)return`${Math.round(m)} min ago`;if(m<1440)return`${Math.round(m/60)} h ago`;return`${Math.round(m/1440)} d ago`;}
const findProfile=id=>state.profiles.find(p=>p.id===id)||getDefaultProfile();
const getDefaultProfile=()=>state.profiles.find(p=>p.isDefault)||state.profiles[0];
const setDefaultProfile=id=>state.profiles.forEach(p=>p.isDefault=p.id===id);
const findClient=id=>state.clients.find(c=>c.id===id);
const findInvoice=id=>state.invoices.find(i=>i.id===id);
const findTemplate=id=>state.lineItemTemplates.find(t=>t.id===id);
function fmtMoney(n){const c=state.settings.currency||"EUR",l=state.settings.locale||"en-IE";try{return new Intl.NumberFormat(l,{style:"currency",currency:c}).format(Number(n)||0);}catch{return(Number(n)||0).toFixed(2)+" "+c;}}
function fmtDate(iso){if(!iso)return"—";const d=new Date(iso+(iso.length===10?"T00:00:00":""));return isNaN(d)?iso:d.toLocaleDateString(state.settings.locale||"en-IE",{day:"numeric",month:"short",year:"numeric"});}
function todayISO(){const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;}
function addDaysISO(iso,days){const d=new Date(iso+"T00:00:00");d.setDate(d.getDate()+days);return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;}
function esc(s){return String(s??"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#039;");}
const nl2br=s=>esc(s).replace(/\n/g,"<br>");
function effectiveStatus(inv){if(inv.status==="paid"||inv.status==="draft")return inv.status;return inv.dueDate&&inv.dueDate<todayISO()?"overdue":"sent";}

<h3 style="margin-top:30px;margin-bottom:10px">What's an invoice?</h3>
<p class="card-sub" style="margin-bottom:10px">New to all this? Start here. Tap a topic to expand it.</p>
<details class="help-item"><summary>What an invoice actually is</summary><div class="help-body">
<p>An <strong>invoice</strong> is a bill you send to someone after you've done work for them or sold them something. It says, in writing: <em>here's what I did, here's what it cost, here's how to pay me, and here's by when.</em></p>
<p>An example: you finish a couple of small jobs for a client during May. At the end of the month you send them an invoice that lists each job, the price of each, the total they owe, and your bank details. They pay. You both have a record of it.</p>
</div></details>
<details class="help-item"><summary>Why bother — why not just ask?</summary><div class="help-body">
<p><strong>It's a clear record.</strong> You and the client both have it in writing. No "wait, what was that charge for again?" arguments months later.</p>
<p><strong>It tends to get paid faster.</strong> Most people pay a proper invoice. Fewer people pay a casual text. Putting a due date on it sets the expectation.</p>
<p><strong>Companies often need one.</strong> Many businesses literally can't pay you without one — their finance team needs the paper trail.</p>
<p><strong>It's how you do your taxes.</strong> When you file your tax return, you need to show what came in and from whom. Invoices are where that information comes from.</p>
<p><strong>It looks professional.</strong> A clean document signals you take the work seriously, and people take you more seriously back.</p>
</div></details>
<details class="help-item"><summary>What goes on one</summary><div class="help-body">
<p>Every invoice has the same ingredients:</p>
<p><strong>From</strong> — you. Name, address, email, phone, how to pay you (bank, IBAN, Revolut, etc.), and your VAT number if you have one.</p>
<p><strong>Bill to</strong> — the client. Name, address, email.</p>
<p><strong>Invoice number</strong> — a unique label like INV-2026-001 so the two of you can refer back to it later.</p>
<p><strong>Dates</strong> — when you issued it, and when it's due to be paid.</p>
<p><strong>Line items</strong> — what you're charging for, broken down line by line, with the price for each.</p>
<p><strong>Total</strong> — the amount they owe, with VAT separated out if it applies.</p>
<p>Ledger fills most of this in for you once you've set up your profile and saved the client. You only really have to type the bits that change each time, like the line items.</p>
</div></details>
<h3 style="margin-top:30px;margin-bottom:10px">How to use Ledger</h3>
<p class="card-sub" style="margin-bottom:10px">Tap a topic to expand it.</p>
<details class="help-item"><summary>1. Set up "you" first</summary><div class="help-body">
<p>Before you make your first invoice, tell Ledger who <strong>you</strong> are. In Settings, look at <strong>Issuer profiles</strong> near the top and tap <strong>New profile</strong>. Fill in your name, address, email, phone, and how people should pay you — bank details, IBAN, Revolut tag, whatever fits. The <strong>invoice prefix</strong> is just the bit at the start of every invoice number, like INV or STU. If you charge VAT, add your VAT number too.</p>
<p>You can have more than one profile — say one personal, one business. Mark the one you use most as the <strong>default</strong>. That one will be picked for new invoices unless you change it.</p>
</div></details>
<details class="help-item"><summary>2. Add the people you bill</summary><div class="help-body">
<p>Tap the <strong>Clients</strong> tab, then <strong>New client</strong>. The only thing you really need is their name. If you also add their email and billing address, they show up on the invoice automatically. The <strong>default rate</strong> is just a hint — when you bill this person, that number pre-fills the line price for you.</p>
</div></details>
<details class="help-item"><summary>3. Save things you bill for often (optional)</summary><div class="help-body">
<p>If you charge for the same kind of thing over and over — say, "Hour of work, €95" or "Call-out fee, €120" — save it once and reuse it. Go to Settings → <strong>Saved line items</strong> → <strong>New saved line</strong>. Inside any invoice you'll see a small dropdown that drops a saved line in without you having to retype it.</p>
</div></details>
<details class="help-item"><summary>4. Make a new invoice</summary><div class="help-body">
<p>Tap the green <strong>New invoice</strong> button on the Dashboard (or in the Invoices tab). Choose <strong>From</strong> (which of your profiles), <strong>Bill to</strong> (which client), and the dates — when you're issuing it and when it's due. Add what you're charging for with <strong>+ Add line</strong>, or pick a saved one from the dropdown.</p>
<p>If you need to charge VAT, tick <strong>Charge VAT on this invoice</strong> and a tax-rate field appears. Tap <strong>Save draft</strong> when you're done. Nothing has been sent yet — it's just saved on this device for you to review.</p>
</div></details>
<details class="help-item"><summary>5. Send it to the client</summary><div class="help-body">
<p>Open the invoice. Two buttons do the work:</p>
<p><strong>Print / PDF</strong> — opens iPhone's print/save sheet. Choose <strong>Save to Files</strong> to save the invoice as a PDF somewhere you can find it.</p>
<p><strong>Send by email</strong> — opens your Mail or Outlook app with a friendly note already typed for you (greeting, invoice number, total, due date, payment details, sign-off).</p>
<p>For a proper send: tap <strong>Print / PDF</strong> first to save the PDF, <em>then</em> tap <strong>Send by email</strong> and attach that PDF in the mail composer. iPhone won't auto-attach the file for you — that's an Apple rule, not a fault of this app.</p>
</div></details>
<details class="help-item"><summary>6. Mark it sent or paid as things progress</summary><div class="help-body">
<p>Every invoice has one of four labels:</p>
<p><strong>Draft</strong> — not sent yet, still being worked on.<br>
<strong>Sent</strong> — out the door, waiting to be paid.<br>
<strong>Overdue</strong> — sent, and the due date has passed (the app sets this for you).<br>
<strong>Paid</strong> — money received.</p>
<p>Open the invoice and tap <strong>Mark as sent</strong> or <strong>Mark as paid</strong> as things move along. The Dashboard at the top adds it all up so you can see at a glance what you're owed and what's come in.</p>
</div></details>
<details class="help-item"><summary>7. Change one or reuse it</summary><div class="help-body">
<p>Open any invoice and tap <strong>Edit</strong> to change anything on it. Tap <strong>Duplicate</strong> to copy it as a fresh new draft — you get the next invoice number, today's dates, and Draft status. Handy when you bill the same person every month.</p>
</div></details>
<details class="help-item"><summary>8. Keep a backup</summary><div class="help-body">
<p>Your data lives only on this iPhone. Tap <strong>Download backup</strong> in Settings every now and then to save a small file copy somewhere safe — Files, iCloud Drive, or AirDrop to a Mac. If anything ever goes wrong (wrong tap, new phone, factory reset), <strong>Restore from file</strong> brings it all back.</p>
<p>The app also keeps the last 20 saves on this device automatically, so if you make a mistake you can use <strong>Restore an earlier snapshot</strong> just above this section to roll back.</p>
</div></details>
<details class="help-item"><summary>9. Notes for VoiceOver</summary><div class="help-body">
<p>Each invoice and client is a single tappable card — the whole card is one button, so you don't have to pick through nested bits. The status (Sent, Paid, etc.) and total are part of the card's spoken description.</p>
<p>When a pop-up (modal) opens, focus is trapped inside it until you close it. The close button is at the top right of each pop-up; you can also dismiss it with Escape on a keyboard.</p>
<p>The on-screen invoice is fully readable with VoiceOver before you save or print, so always confirm the details out loud in the app before you generate the PDF.</p>
</div></details>

const aria=`Saved line: ${t.description}, ${t.quantity} at ${fmtMoney(t.unitPrice)}, totalling ${fmtMoney(sub)}. Tap to edit.`;
return`<button class="card-button" data-template-id="${t.id}" aria-label="${esc(aria)}">
<div class="card-row">
<div><div class="card-title" style="font-size:1.05rem">${esc(t.description||"(no description)")}</div><div class="card-sub" style="font-family:var(--mono);font-size:.85rem">${t.quantity} × ${esc(fmtMoney(t.unitPrice))}</div></div>
<div style="text-align:right"><div class="card-figure">${esc(fmtMoney(sub))}</div></div>
</div></button>`;
}

function openModal({title,body,footer}){
closeModal({silent:true});
lastFocus=document.activeElement;
const host=document.getElementById("modal-host");
host.setAttribute("aria-hidden","false");
host.innerHTML=`<div class="modal-backdrop" data-backdrop="1"><section class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title"><header class="modal-head"><h2 id="modal-title">${esc(title)}</h2><button class="modal-close" aria-label="Close" data-close="1">×</button></header><div class="modal-body" id="modal-body">${body}</div>${footer?`<footer class="modal-foot">${footer}</footer>`:""}</section></div>`;
document.getElementById("app").inert=true;
const bd=host.querySelector(".modal-backdrop"),md=host.querySelector(".modal");
bd.addEventListener("click",e=>{if(e.target.dataset.backdrop)closeModal();});
host.querySelectorAll("[data-close]").forEach(el=>el.addEventListener("click",()=>closeModal()));
host._esc=e=>{if(e.key==="Escape")closeModal();};
document.addEventListener("keydown",host._esc);
host._trap=e=>{if(e.key!=="Tab")return;const f=md.querySelectorAll('a[href],button:not([disabled]),input:not([disabled]),select:not([disabled]),textarea:not([disabled]),[tabindex]:not([tabindex="-1"])');if(!f.length)return;const first=f[0],last=f[f.length-1];if(e.shiftKey&&document.activeElement===first){e.preventDefault();last.focus();}else if(!e.shiftKey&&document.activeElement===last){e.preventDefault();first.focus();}};
md.addEventListener("keydown",host._trap);
setTimeout(()=>{const t=host.querySelector("#modal-title");if(t){t.setAttribute("tabindex","-1");t.focus();}},30);
}
function closeModal({silent}={}){const host=document.getElementById("modal-host");if(!host.firstChild)return;if(host._esc)document.removeEventListener("keydown",host._esc);host.innerHTML="";host.setAttribute("aria-hidden","true");host._esc=null;document.getElementById("app").inert=false;if(!silent&&lastFocus?.focus)try{lastFocus.focus();}catch{}}

<div class="field-row">
<div class="field"><label for="li-qty-${idx}">Qty / hours</label><div class="field-mono"><input type="number" id="li-qty-${idx}" data-li="quantity" min="0" step="0.01" value="${li.quantity}" /></div></div>
<div class="field"><label for="li-price-${idx}">Unit price</label><div class="field-mono"><input type="number" id="li-price-${idx}" data-li="unitPrice" min="0" step="0.01" value="${li.unitPrice}" /></div></div>
</div>
${inv.vatEnabled?`<div class="field"><label for="li-vat-${idx}">Line VAT (%)</label><div class="field-mono"><input type="number" id="li-vat-${idx}" data-li="vatRate" min="0" max="100" step="0.01" value="${li.vatRate??inv.defaultVatRate}" /></div></div>`:""}
<div class="btn-row" style="margin-top:0"><button type="button" class="btn-ghost" data-line-action="remove" aria-label="Remove line ${idx+1}">Remove line</button></div>
</div>`;
}).join("");
wrap.querySelectorAll("[data-line-idx]").forEach(row=>{
const idx=Number(row.dataset.lineIdx);
row.querySelectorAll("[data-li]").forEach(input=>{
input.addEventListener("input",()=>{inv.lineItems[idx][input.dataset.li]=input.value;renderTotals();const sub=(Number(inv.lineItems[idx].quantity)||0)*(Number(inv.lineItems[idx].unitPrice)||0);const sumEl=row.querySelector(".line-item-sum");if(sumEl)sumEl.textContent=fmtMoney(sub);});
});
row.querySelector('[data-line-action="remove"]').addEventListener("click",()=>{if(inv.lineItems.length===1){toast("An invoice needs at least one line");return;}inv.lineItems.splice(idx,1);renderLines();renderTotals();});
});
}

renderLines();renderTotals();

document.getElementById("i-add-client").addEventListener("click",()=>{const name=prompt("New client name:");if(!name)return;const c={id:uid("cl"),name:name.trim(),email:"",address:"",defaultRate:"",notes:""};state.clients.push(c);saveState();inv.clientId=c.id;document.getElementById("i-client").innerHTML=clientOpts();toast("Client added — open Clients to add full details");});

document.getElementById("i-due").addEventListener("change",e=>{inv.dueDate=e.target.value;});
document.getElementById("i-number").addEventListener("input",e=>{inv.number=e.target.value;});
document.getElementById("i-client").addEventListener("change",e=>{inv.clientId=e.target.value;});
document.getElementById("i-notes").addEventListener("input",e=>{inv.notes=e.target.value;});

document.querySelector('#modal-host [data-action="save"]').addEventListener("click",()=>{
if(!inv.number.trim()){toast("Invoice number required");return;}

if(!inv.clientId){toast("Pick a client");return;}
inv.lineItems=inv.lineItems.map(li=>({...li,quantity:Number(li.quantity)||0,unitPrice:Number(li.unitPrice)||0,vatRate:Number(li.vatRate??inv.defaultVatRate)||0}));
if(isNew){state.invoices.push(inv);bumpInvoiceSeq(inv.profileId);}else{const i=state.invoices.findIndex(x=>x.id===inv.id);state.invoices[i]=inv;}
saveState();toast(isNew?"Invoice saved":"Saved");closeModal();
if(isNew)openInvoiceDetail(inv.id);else render();
});

if(del)del.addEventListener("click",()=>{if(!confirm(`Delete invoice ${inv.number}?`))return;const idx=state.invoices.findIndex(x=>x.id===inv.id);if(idx<0)return;const snap=JSON.parse(JSON.stringify(state.invoices[idx]));state.invoices.splice(idx,1);saveState();closeModal();render();toastUndo(`Invoice ${snap.number} deleted`,()=>{state.invoices.splice(idx,0,snap);saveState();render();toast("Invoice restored");});});

function openInvoiceDetail(id){
const inv=findInvoice(id);if(!inv)return;
const eff=effectiveStatus(inv);
const body=`<div class="invoice-doc" id="invoice-doc">${renderInvoiceDoc(inv)}</div>

<div class="invoice-status-row" style="margin-top:18px;display:flex;gap:8px;flex-wrap:wrap;align-items:center">
<span class="pill pill-${eff}">${eff[0].toUpperCase()+eff.slice(1)}</span>
${inv.sentDate?`<span class="card-sub" style="font-family:var(--mono);font-size:.78rem">Sent ${esc(fmtDate(inv.sentDate))}</span>`:""}
${inv.paidDate?`<span class="card-sub" style="font-family:var(--mono);font-size:.78rem">Paid ${esc(fmtDate(inv.paidDate))}</span>`:""}
</div>`;
const footer=`<button class="btn btn-secondary" data-action="edit">Edit</button>
<button class="btn btn-secondary" data-action="duplicate">Duplicate</button>
<button class="btn btn-secondary" data-action="send">Send by email</button>
<button class="btn btn-secondary" data-action="print">Print / PDF</button>
${inv.status==="draft"?`<button class="btn btn-primary" data-action="mark-sent">Mark as sent</button>`:""}
${inv.status==="sent"?`<button class="btn btn-primary" data-action="mark-paid">Mark as paid</button>`:""}
${inv.status==="paid"?`<button class="btn btn-secondary" data-action="unmark-paid">Mark as unpaid</button>`:""}`;
openModal({title:`Invoice ${inv.number}`,body,footer});
const h=document.getElementById("modal-host");
h.querySelector('[data-action="edit"]').addEventListener("click",()=>{closeModal();openInvoiceModal(inv.id);});
h.querySelector('[data-action="duplicate"]').addEventListener("click",()=>{const cp=JSON.parse(JSON.stringify(inv));cp.id=uid("inv");cp.number=nextInvoiceNumber(cp.profileId);cp.issueDate=todayISO();cp.dueDate=addDaysISO(todayISO(),state.settings.defaultPaymentTermsDays||14);cp.status="draft";cp.sentDate=null;cp.paidDate=null;state.invoices.push(cp);bumpInvoiceSeq(cp.profileId);saveState();toast("Duplicated");closeModal();openInvoiceDetail(cp.id);});
h.querySelector('[data-action="send"]').addEventListener("click",()=>sendByEmail(inv));
h.querySelector('[data-action="print"]').addEventListener("click",()=>window.print());
const ms=h.querySelector('[data-action="mark-sent"]');
if(ms)ms.addEventListener("click",()=>{inv.status="sent";inv.sentDate=todayISO();saveState();toast("Marked as sent");closeModal();openInvoiceDetail(inv.id);});
const mp=h.querySelector('[data-action="mark-paid"]');
if(mp)mp.addEventListener("click",()=>{inv.status="paid";inv.paidDate=todayISO();saveState();toast("Marked as paid");closeModal();openInvoiceDetail(inv.id);});
const up=h.querySelector('[data-action="unmark-paid"]');
if(up)up.addEventListener("click",()=>{inv.status="sent";inv.paidDate=null;saveState();toast("Marked as unpaid");closeModal();openInvoiceDetail(inv.id);});
}

function sendByEmail(inv){

function downloadBackup(){
const data=JSON.stringify(state,null,2);
const blob=new Blob([data],{type:"application/json"});
const url=URL.createObjectURL(blob);
const a=document.createElement("a");a.href=url;a.download=`ledger-backup-${todayISO()}.json`;
document.body.appendChild(a);a.click();document.body.removeChild(a);
setTimeout(()=>URL.revokeObjectURL(url),1000);
try{localStorage.setItem(BKEY,new Date().toISOString());}catch{}

function handleRestore(e){
const file=e.target.files[0];if(!file)return;
const r=new FileReader();
r.onload=()=>{try{const p=JSON.parse(r.result);const ok=(p.profiles&&Array.isArray(p.profiles))||(p.business&&Array.isArray(p.invoices));if(!ok)throw new Error("Not a valid Ledger backup");if(!confirm("Replace all current data with the backup? Your current data is auto-saved as a snapshot you can restore back to."))return;pushHistory();localStorage.setItem(KEY,JSON.stringify(p));state=loadState();toast("Restored from backup");setView("dashboard");}catch(err){console.error(err);toast("Couldn't read that file — "+err.message);}finally{e.target.value="";}};
r.readAsText(file);
}

function openHistoryModal(){
const h=loadHistory();
if(!h.length){toast("No earlier snapshots yet — they appear after you save changes.");return;}
const rows=h.map((entry,i)=>{
let counts="—",countsSpoken="";try{const s=JSON.parse(entry.snapshot);counts=`${s.invoices?.length||0} inv · ${s.clients?.length||0} cli · ${s.profiles?.length||0} prof`;countsSpoken=`${s.invoices?.length||0} invoices, ${s.clients?.length||0} clients, ${s.profiles?.length||0} profiles`;}catch{}
const when=new Date(entry.at),rel=fmtRelative(entry.at);
const aria=`Roll back to snapshot from ${when.toLocaleString(state.settings.locale||"en-IE")}, ${rel}, contains ${countsSpoken}`;
return`<button class="card-button" data-snap-idx="${i}" aria-label="${esc(aria)}"><div class="card-row"><div><div class="card-title" style="font-size:1rem">${esc(when.toLocaleString(state.settings.locale||"en-IE"))}</div><div class="card-sub">${esc(counts)}</div></div><div style="text-align:right"><div class="card-sub" style="font-family:var(--mono);font-size:.78rem">${esc(rel)}</div></div></div></button>`;
}).join("");
const body=`<p class="card-sub" style="margin-bottom:12px">Snapshots are taken automatically before each save. Tap one to roll back to it. The state you have now will itself become a snapshot, so you can flip back.</p><div class="stack">${rows}</div>`;
const footer=`<button class="btn btn-secondary" data-close="1">Close</button>`;
openModal({title:"Earlier snapshots",body,footer});
document.querySelectorAll('#modal-host [data-snap-idx]').forEach(b=>b.addEventListener("click",()=>{
const idx=Number(b.dataset.snapIdx),entry=h[idx];
if(!confirm(`Roll back to the snapshot from ${new Date(entry.at).toLocaleString()}?`))return;
try{pushHistory();localStorage.setItem(KEY,entry.snapshot);state=loadState();toast("Rolled back");closeModal();setView("dashboard");}catch(err){toast("Restore failed: "+err.message);}
}));
}

async function ensurePersistentStorage(){
if(!navigator.storage||!navigator.storage.persist)return;
try{
let granted=await navigator.storage.persisted();
if(!granted)granted=await navigator.storage.persist();
_persistGranted=!!granted;
}catch(e){console.warn("persist() failed",e);}
}
function registerSW(){
if(!("serviceWorker" in navigator))return;
navigator.serviceWorker.register("./sw.js").then(reg=>{
  reg.addEventListener("updatefound",()=>{
    const nw=reg.installing;if(!nw)return;
    nw.addEventListener("statechange",()=>{
      if(nw.state==="installed"&&navigator.serviceWorker.controller){
        toastAction("A new version is available","Reload",()=>location.reload(),{sticky:true});
      }
    });
  });
}).catch(e=>console.warn("SW registration failed",e));
}

function getLockState(){try{return JSON.parse(localStorage.getItem(LKEY)||"{}");}catch{return{};}}
function setLockState(s){try{localStorage.setItem(LKEY,JSON.stringify(s));}catch{}}
function webauthnAvailable(){return!!(window.PublicKeyCredential&&navigator.credentials);}
async function platformAuthAvailable(){if(!webauthnAvailable())return false;try{return await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable();}catch{return false;}}
const _b64u=buf=>btoa(String.fromCharCode(...new Uint8Array(buf)));
const _fromB64u=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
function newSalt(){const a=new Uint8Array(16);crypto.getRandomValues(a);return [...a].map(b=>b.toString(16).padStart(2,"0")).join("");}
async function hashPass(pass,salt){const data=new TextEncoder().encode(salt+":"+pass);const buf=await crypto.subtle.digest("SHA-256",data);return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,"0")).join("");}
async function verifyPasscode(input){const lock=getLockState();if(!lock.passSalt||!lock.passHash)return false;const h=await hashPass(input,lock.passSalt);return h===lock.passHash;}

async function registerLockCredential(){
const challenge=crypto.getRandomValues(new Uint8Array(32));
const userId=crypto.getRandomValues(new Uint8Array(16));
const cred=await navigator.credentials.create({publicKey:{challenge,rp:{name:"Ledger"},user:{id:userId,name:"ledger@local",displayName:"Ledger"},pubKeyCredParams:[{type:"public-key",alg:-7},{type:"public-key",alg:-257}],authenticatorSelection:{authenticatorAttachment:"platform",userVerification:"required",residentKey:"preferred"},timeout:60000,attestation:"none"}});
return _b64u(cred.rawId);
}
async function verifyLockCredential(credId){
const challenge=crypto.getRandomValues(new Uint8Array(32));
await navigator.credentials.get({publicKey:{challenge,allowCredentials:[{type:"public-key",id:_fromB64u(credId),transports:["internal"]}],userVerification:"required",timeout:60000}});
}

function openSetPasscodeModal({title,onSave,offerFaceIdAfter=false}){
const body=`<form class="form" autocomplete="off">
<p class="card-sub">Pick a passcode (4 or more characters). You'll be asked for it when the app opens. Stored only on this device.</p>
<div class="field"><label for="lk-pass1">New passcode</label><input type="password" id="lk-pass1" autocomplete="new-password" inputmode="text" minlength="4" required /></div>
<div class="field"><label for="lk-pass2">Confirm passcode</label><input type="password" id="lk-pass2" autocomplete="new-password" inputmode="text" minlength="4" required /></div>
<p id="lk-set-err" role="alert" style="color:var(--red);min-height:1em;margin:0"></p>
</form>`;
const footer=`<button class="btn btn-secondary" data-close="1">Cancel</button><button class="btn btn-primary" data-action="save">Save passcode</button>`;
openModal({title,body,footer});
setTimeout(()=>{try{document.getElementById("lk-pass1").focus();}catch{}},60);
document.querySelector('#modal-host [data-action="save"]').addEventListener("click",async()=>{
const p1=document.getElementById("lk-pass1").value;
const p2=document.getElementById("lk-pass2").value;
const err=document.getElementById("lk-set-err");
if(p1.length<4){err.textContent="Passcode must be at least 4 characters";return;}
if(p1!==p2){err.textContent="The two passcodes don't match";return;}
const salt=newSalt(),hash=await hashPass(p1,salt);
onSave(salt,hash);
closeModal();
if(offerFaceIdAfter){
const cur=getLockState();
if(!cur.credentialId&&await platformAuthAvailable()&&confirm("Add Face ID for faster unlock?")){
try{const credId=await registerLockCredential();const cur2=getLockState();setLockState({...cur2,credentialId:credId});toast("Face ID added");}
catch(e){if(e?.name!=="NotAllowedError")toast("Couldn't add Face ID");}
}
}
renderSettings();
});
}

function reauth(onSuccess){
const lock=getLockState();
const hasFace=!!lock.credentialId;
const hasPass=!!(lock.passSalt&&lock.passHash);
if(!lock.enabled||(!hasFace&&!hasPass)){onSuccess();return;}
const body=`<div style="text-align:center">
<p>Confirm with ${hasFace&&hasPass?"Face ID or your passcode":hasFace?"Face ID":"your passcode"} to continue.</p>
${hasFace?`<div class="btn-row" style="justify-content:center;margin:14px 0"><button id="reauth-faceid" class="btn btn-primary">Use Face ID</button></div>`:""}
${hasPass?`<form id="reauth-form" class="form" style="margin:14px auto 0;max-width:280px;text-align:left">
<div class="field"><label for="reauth-input">Passcode</label><input type="password" id="reauth-input" autocomplete="current-password" inputmode="text" /></div>
<p id="reauth-err" role="alert" style="color:var(--red);min-height:1em;margin:0"></p>
<div class="btn-row" style="justify-content:center"><button type="submit" class="btn btn-primary">Confirm</button></div>
</form>`:""}
</div>`;
const footer=`<button class="btn btn-secondary" data-close="1">Cancel</button>`;
openModal({title:"Confirm",body,footer});
if(hasFace){
document.getElementById("reauth-faceid").addEventListener("click",async()=>{
try{await verifyLockCredential(lock.credentialId);closeModal();onSuccess();}
catch(e){if(e?.name!=="NotAllowedError")console.warn(e);if(hasPass){try{document.getElementById("reauth-input").focus();}catch{}}}
});
}
if(hasPass){
document.getElementById("reauth-form").addEventListener("submit",async e=>{
e.preventDefault();
const input=document.getElementById("reauth-input").value;
if(await verifyPasscode(input)){closeModal();onSuccess();}
else{document.getElementById("reauth-err").textContent="Incorrect passcode";document.getElementById("reauth-input").value="";try{document.getElementById("reauth-input").focus();}catch{}}
});
setTimeout(()=>{try{document.getElementById("reauth-input").focus();}catch{}},60);
}
}

function enableAppLock(){
openSetPasscodeModal({title:"Set passcode",offerFaceIdAfter:true,onSave:(salt,hash)=>{
const cur=getLockState();
setLockState({enabled:true,passSalt:salt,passHash:hash,credentialId:cur.credentialId||null});
toast("App lock enabled");
}});
}
function addPasscode(){
openSetPasscodeModal({title:"Add passcode",offerFaceIdAfter:false,onSave:(salt,hash)=>{
const cur=getLockState();
setLockState({...cur,enabled:true,passSalt:salt,passHash:hash});
toast("Passcode added");
}});
}
function changePasscode(){
reauth(()=>{
openSetPasscodeModal({title:"Change passcode",offerFaceIdAfter:false,onSave:(salt,hash)=>{
const cur=getLockState();
setLockState({...cur,passSalt:salt,passHash:hash});
toast("Passcode changed");
}});
});
}
function disableAppLock(){
reauth(()=>{setLockState({});toast("App lock disabled");renderSettings();});
}
async function addFaceId(){
if(!await platformAuthAvailable()){toast("Face ID / Touch ID isn't available on this device");return;}
reauth(async()=>{
try{const credId=await registerLockCredential();const cur=getLockState();setLockState({...cur,credentialId:credId});toast("Face ID added");renderSettings();}
catch(e){if(e?.name==="NotAllowedError")toast("Cancelled");else toast("Couldn't add Face ID");console.warn(e);}
});
}
function removeFaceId(){
const lock=getLockState();
if(!lock.passSalt||!lock.passHash){
if(!confirm("Turning off Face ID will leave you with no way back into the app — there's no passcode set. Add a passcode first, or continue and disable the lock entirely?"))return;
}
reauth(()=>{
const cur=getLockState();
const newState={...cur,credentialId:null};
if(!newState.passSalt||!newState.passHash){
setLockState({});toast("App lock disabled (no passcode was set)");
}else{
setLockState(newState);toast("Face ID turned off");
}
renderSettings();
});
}

function lockNow(){
const lock=getLockState();if(!lock.enabled)return;
closeModal({silent:true});_isLocked=true;main.innerHTML="";showLockScreen();
}

function finishUnlock(){
const host=document.getElementById("modal-host");
_isLocked=false;
host.innerHTML="";
host.setAttribute("aria-hidden","true");
document.getElementById("app").inert=false;
render({focusHeading:true});
toast("Unlocked");
}

function showLockScreen(){
const lock=getLockState();
const hasFace=!!lock.credentialId;
const hasPass=!!(lock.passSalt&&lock.passHash);
if(!lock.enabled||(!hasFace&&!hasPass)){_isLocked=false;return;}
const host=document.getElementById("modal-host");
host.setAttribute("aria-hidden","false");
host.innerHTML=`<div class="modal-backdrop"><section class="modal" role="dialog" aria-modal="true" aria-labelledby="lock-title" style="max-width:420px">
<header class="modal-head" style="justify-content:center"><h2 id="lock-title">Ledger is locked</h2></header>
<div class="modal-body" style="text-align:center">
<div style="font-family:var(--display);font-style:italic;font-size:3rem;color:var(--gold);margin:8px 0 14px" aria-hidden="true">§</div>
${hasFace?`<div class="btn-row" style="justify-content:center;margin-bottom:14px"><button id="btn-do-faceid" class="btn btn-primary">Unlock with Face ID</button></div>`:""}
${hasPass?`<form id="lk-form" class="form" autocomplete="off" style="margin:0 auto;max-width:280px;text-align:left">
<div class="field"><label for="lk-input">Passcode</label><input type="password" id="lk-input" autocomplete="current-password" inputmode="text" /></div>
<p id="lk-err" role="alert" style="color:var(--red);min-height:1em;margin:0"></p>
<div class="btn-row" style="justify-content:center"><button type="submit" class="btn btn-primary">Unlock</button></div>
</form>`:`<p style="margin-top:18px;font-size:.9rem;color:var(--ink-muted)">No passcode set. If Face ID fails, use the option below.</p>`}
<details style="margin-top:28px;font-size:.85rem;color:var(--ink-muted)"><summary style="cursor:pointer">Locked out?</summary>
<p style="margin-top:10px">If your passcode and Face ID aren't working, you can erase all local data and start over. Any backup files you saved earlier will still work to restore.</p>
<div class="btn-row" style="justify-content:center"><button id="btn-locked-erase" class="btn btn-danger">Erase all data</button></div>
</details>
</div></section></div>`;
document.getElementById("app").inert=true;
if(hasFace){
document.getElementById("btn-do-faceid").addEventListener("click",async()=>{
try{await verifyLockCredential(lock.credentialId);finishUnlock();}
catch(e){if(e?.name!=="NotAllowedError")console.warn(e);
if(hasPass){try{document.getElementById("lk-input").focus();}catch{}}
toast(hasPass?"Face ID failed — use your passcode":"Face ID failed — try again");}
});
}
if(hasPass){
document.getElementById("lk-form").addEventListener("submit",async e=>{
e.preventDefault();
const input=document.getElementById("lk-input").value;
if(await verifyPasscode(input)){finishUnlock();}
else{document.getElementById("lk-err").textContent="Incorrect passcode";document.getElementById("lk-input").value="";try{document.getElementById("lk-input").focus();}catch{}}
});
setTimeout(()=>{try{document.getElementById("lk-input").focus();}catch{}},60);
}
document.getElementById("btn-locked-erase").addEventListener("click",()=>{
if(!confirm("Erase ALL local data and disable the lock? This cannot be undone."))return;
if(!confirm("Really erase everything?"))return;
[KEY,HKEY,BKEY,LKEY].forEach(k=>{try{localStorage.removeItem(k);}catch{}});
location.reload();
});
}

let toastTimer=null,_actionPending=false;
function toast(msg){clearActionToast();const old=document.querySelector(".toast");if(old)old.remove();const t=document.createElement("div");t.className="toast";t.textContent=msg;document.body.appendChild(t);if(toastTimer)clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.remove(),2400);const sr=document.getElementById("toast-host");sr.textContent="";setTimeout(()=>sr.textContent=msg,30);}
function clearActionToast(){_actionPending=false;if(toastTimer){clearTimeout(toastTimer);toastTimer=null;}const t=document.querySelector(".toast");if(t&&t.classList.contains("toast-action"))t.remove();}
function toastAction(msg,label,fn,{timeoutMs=8000,sticky=false}={}){
  clearActionToast();
  const old=document.querySelector(".toast");if(old)old.remove();
  const t=document.createElement("div");t.className="toast toast-action";
  const span=document.createElement("span");span.textContent=msg;
  const btn=document.createElement("button");btn.textContent=label;btn.className="toast-action-btn";btn.setAttribute("aria-label",label);
  btn.addEventListener("click",()=>{clearActionToast();fn();});
  t.appendChild(span);t.appendChild(btn);
  document.body.appendChild(t);
  _actionPending=true;
  if(!sticky)toastTimer=setTimeout(clearActionToast,timeoutMs);
  const sr=document.getElementById("toast-host");sr.textContent="";
  setTimeout(()=>sr.textContent=msg+(sticky?"":". "+label+" available for "+Math.round(timeoutMs/1000)+" seconds"),30);
}
function toastUndo(msg,undoFn){toastAction(msg,"Undo",undoFn,{timeoutMs:6000});}
const VIEW_TITLES={dashboard:"Dashboard",invoices:"Invoices",clients:"Clients",settings:"Settings"};
function setPageTitle(){const t=VIEW_TITLES[view]||"";document.title=t?`Ledger — ${t}`:"Ledger — Invoices";}

document.querySelectorAll(".tab").forEach(t=>t.addEventListener("click",()=>{if(_isLocked)return;setView(t.dataset.view);}));
{
const lock=getLockState();
if(lock.enabled&&(lock.credentialId||(lock.passSalt&&lock.passHash))){_isLocked=true;main.innerHTML="";showLockScreen();}
else render();
}
if(!_isLocked&&state.profiles.every(p=>!p.name)&&state.invoices.length===0&&state.clients.length===0){setTimeout(()=>toast("Tip: open Settings to set up your first profile"),600);}
window.addEventListener("load",registerSW);
ensurePersistentStorage().then(()=>{if(view==="settings"&&!_isLocked)renderSettings();});
document.addEventListener("visibilitychange",()=>{
const lock=getLockState();if(!lock.enabled)return;
if(document.hidden){_hiddenSince=Date.now();}
else if(_hiddenSince&&Date.now()-_hiddenSince>RELOCK_AFTER_MS&&!_isLocked){_hiddenSince=null;lockNow();}
else{_hiddenSince=null;}
});
</script>
